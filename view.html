<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Father's Day Message For You — PixelForge Tech</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        :root {
            --pink:  #ff6b9d;
            --deep:  #c44569;
            --teal:  #00c9a7;
            --gold:  #FFD700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px 60px;
            overflow-x: hidden;
            overflow-y: auto;
            background: #0a0a14;
            position: relative;
        }

        #aurora-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #tsparticles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .gratitude-strip {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 2;
            overflow: hidden;
            white-space: nowrap;
            padding: 10px 0;
            background: linear-gradient(90deg, rgba(255,0,140,0.08), rgba(0,255,255,0.08));
            border-bottom: 1px solid rgba(255,255,255,0.06);
            pointer-events: none;
        }

        .gratitude-track {
            display: inline-flex;
            gap: 40px;
            animation: scrollLeft 26s linear infinite;
        }

        .gratitude-track span {
            font-family: 'Caveat', cursive;
            font-size: 19px;
            color: rgba(255,255,255,0.55);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .gratitude-track span i { font-size: 13px; color: var(--gold); }

        @keyframes scrollLeft {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 520px;
            width: 100%;
            margin-top: 64px;
            background: transparent;
            border-radius: 36px;
            padding: 44px 32px 36px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            text-align: center;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            width: 130px;
            height: 130%;
            background: linear-gradient(180deg, #00b7ff, #ff30ff, #FFD700, #00b7ff);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0deg);
            animation: rotateBorder 4s linear infinite;
            z-index: 0;
        }

        @keyframes rotateBorder {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .container::after {
            content: "";
            position: absolute;
            inset: 4px;
            background: linear-gradient(145deg, #ff6b9d 0%, #c44569 60%, #a03355 100%);
            border-radius: 33px;
            z-index: 1;
        }

        .container > * { position: relative; z-index: 2; }

        .brand-section {
            position: absolute;
            top: 18px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 12px;
            background: rgba(0,0,0,0.35);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            animation: brandGlow 3s ease-in-out infinite;
            z-index: 3;
        }

        @keyframes brandGlow {
            0%,100% { box-shadow: 0 0 10px rgba(255,0,140,0.3); }
            50%      { box-shadow: 0 0 22px rgba(0,255,255,0.4); }
        }

        .pixelforge-logo {
            width: 26px; height: 26px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px rgba(255,0,140,0.9));
            animation: logoFloat 2s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-3px); }
        }

        .brand-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            background: linear-gradient(90deg, #FF008C, #00FFFF, #FFFF00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        /* ══════════ LOADING ══════════ */
        .loading { padding: 50px 10px; color: #fff; }
        .loading p { font-size: 15px; margin-bottom: 16px; opacity: 0.85; }

        .spinner {
            border: 4px solid rgba(255,255,255,0.25);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message {
            font-size: 15px;
            color: white;
            padding: 22px;
            background: rgba(255,0,0,0.25);
            border-radius: 15px;
            margin: 30px 0 10px;
            border: 1px solid rgba(255,0,0,0.4);
        }

        /* ══════════ ENVELOPE STAGE ══════════ */
        .envelope-stage {
            padding: 36px 0 10px;
        }

        .envelope-stage h2 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 21px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #fff, #ffe6cc, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .envelope-stage .from-line {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
        }

        .envelope-click-area {
            position: relative;
            width: 260px;
            height: 175px;
            margin: 0 auto;
            cursor: pointer;
            filter: drop-shadow(0 16px 36px rgba(0,0,0,0.45));
            animation: envelopeFloat 3s ease-in-out infinite;
        }

        @keyframes envelopeFloat {
            0%,100% { transform: translateY(0) rotate(-1deg); }
            50%      { transform: translateY(-8px) rotate(1deg); }
        }

        .envelope-click-area:hover { animation-play-state: paused; transform: scale(1.03); }

        .envelope-body {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #fff5e6, #ffe6cc);
            border-radius: 12px;
            box-shadow: inset 0 -10px 20px rgba(196,69,105,0.08);
        }

        .envelope-flap {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 0;
            border-left: 130px solid transparent;
            border-right: 130px solid transparent;
            border-top: 92px solid #ffd89b;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
            transform-origin: top center;
            transition: transform 0.7s cubic-bezier(.4,1.5,.5,1);
            transform: rotateX(0deg);
            z-index: 3;
        }

        .envelope-seal {
            position: absolute;
            top: 56%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ff8fb3, #c44569 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff5e6;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(196,69,105,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
            animation: sealPulse 2s ease-in-out infinite;
            z-index: 4;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        @keyframes sealPulse {
            0%,100% { box-shadow: 0 4px 10px rgba(196,69,105,0.5), inset 0 2px 4px rgba(255,255,255,0.3), 0 0 0 0 rgba(255,0,140,0.4); }
            50%      { box-shadow: 0 4px 14px rgba(196,69,105,0.6), inset 0 2px 4px rgba(255,255,255,0.3), 0 0 0 10px rgba(255,0,140,0); }
        }

        .envelope-letter-peek {
            position: absolute;
            left: 14px; right: 14px;
            bottom: 8px;
            height: 0;
            background: #fff;
            border-radius: 8px 8px 0 0;
            z-index: 2;
            transition: height 0.5s ease 0.3s;
        }

        .envelope-click-area.opening .envelope-flap {
            transform: rotateX(180deg);
        }

        .envelope-click-area.opening .envelope-seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.4);
        }

        .envelope-click-area.opening .envelope-letter-peek {
            height: 60px;
        }

        .envelope-hint {
            margin-top: 26px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: hintPulse 1.8s ease-in-out infinite;
        }

        @keyframes hintPulse {
            0%,100% { opacity: 0.5; }
            50%      { opacity: 1; }
        }

        /* ══════════ REVEALED MESSAGE ══════════ */
        .reveal-stage { display: none; }
        .reveal-stage.visible { display: block; }

        .reveal-header { margin-bottom: 6px; }

        .reveal-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 27px;
            font-weight: 900;
            background: linear-gradient(90deg, #fff 0%, #ffe6cc 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .from-name {
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            margin: 4px 0 20px;
        }

        .from-name strong {
            background: linear-gradient(90deg, #FFD700, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Glowing sparkling photo */
        .photo-section {
            position: relative;
            margin: 10px 0 26px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .circle-wrapper { position: relative; width: 240px; height: 240px; }

        .ring-outer {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: rgba(255,215,0,0.7);
            border-right-color: rgba(255,107,157,0.5);
            animation: spinRing 4s linear infinite;
        }

        .ring-inner {
            position: absolute;
            inset: -18px;
            border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.15);
            animation: spinRing 10s linear infinite reverse;
        }

        @keyframes spinRing { to { transform: rotate(360deg); } }

        .circle-frame {
            position: relative;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            overflow: hidden;
            border: 7px solid rgba(255,255,255,0.55);
            animation: photoGlow 2.4s ease-in-out infinite;
        }

        @keyframes photoGlow {
            0%,100% { box-shadow: 0 0 0 3px rgba(255,215,0,0.5), 0 0 40px rgba(255,215,0,0.45), 0 0 70px rgba(255,0,140,0.3); }
            50%      { box-shadow: 0 0 0 5px rgba(0,255,255,0.4), 0 0 60px rgba(0,255,255,0.4), 0 0 90px rgba(255,107,157,0.4); }
        }

        .photo-image { width: 100%; height: 100%; object-fit: cover; display: block; }

        .sparkle-layer { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; z-index: 5; }

        .sparkle {
            position: absolute;
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,255,255,0.9), 0 0 12px 4px rgba(255,215,0,0.6);
            animation: sparkleTwinkle 1.8s ease-in-out infinite;
        }

        @keyframes sparkleTwinkle {
            0%,100% { opacity: 0; transform: scale(0.3); }
            50%      { opacity: 1; transform: scale(1); }
        }

        /* Letter / message */
        .message-section { margin: 10px 0 0; }

        .message-label {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .message-text {
            background: rgba(255,255,255,0.96);
            padding: 24px 22px;
            border-radius: 16px;
            color: #3a2a2f;
            font-size: 17px;
            line-height: 1.7;
            font-family: 'Caveat', cursive;
            font-weight: 600;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.18);
            border-left: 5px solid #FF008C;
            position: relative;
            text-align: left;
        }

        .message-text::before {
            content: "\201C";
            font-family: Georgia, serif;
            font-size: 46px;
            color: rgba(196,69,105,0.25);
            position: absolute;
            top: -6px; left: 14px;
        }

        .gratitude-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 18px;
        }

        .gratitude-tag {
            font-size: 11.5px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .gratitude-tag i { font-size: 11px; color: var(--gold); }

        .footer {
            margin-top: 28px;
            font-size: 12.5px;
            color: rgba(255,255,255,0.65);
            line-height: 1.7;
        }

        .heart-accent {
            color: #ffe6cc;
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.1); }
        }

        .footer-brand {
            margin-top: 14px;
            padding: 9px 12px;
            border-top: 1px solid rgba(255,255,255,0.12);
            font-size: 10.5px;
            background: linear-gradient(90deg, rgba(255,0,140,0.08), rgba(0,255,255,0.08));
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .pixel-blocks span { display: inline-block; width: 8px; height: 8px; border-radius: 2px; }

        /* ══════════ BUTTON ══════════ */
        .button {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            font-family: 'Inter', sans-serif;
            margin-top: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fff5e6, #ffd89b);
            color: #c44569;
            box-shadow: 0 6px 24px rgba(0,0,0,0.2);
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,107,157,0.4); }

        /* ══════════ CONFETTI ══════════ */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            border-radius: 2px;
        }

        @keyframes confettiFall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            .container { padding: 34px 18px 28px; border-radius: 28px; }
            .reveal-header h1 { font-size: 22px; }
            .circle-frame, .circle-wrapper { width: 190px; height: 190px; }
            .envelope-click-area { width: 220px; height: 150px; }
            .envelope-flap { border-left-width: 110px; border-right-width: 110px; border-top-width: 78px; }
        }
    </style>
</head>
<body>
    <audio id="welcomeAudio" src="welcome.mp3" loop preload="auto"></audio>

    <canvas id="aurora-canvas"></canvas>
    <div id="tsparticles"></div>

    <div class="gratitude-strip">
        <div class="gratitude-track" id="gratitudeTrack"></div>
    </div>

    <div class="container animate__animated animate__fadeInUp">

        <div class="brand-section">
            <img src="pixelforge-logo.png" alt="PixelForge" class="pixelforge-logo">
            <span class="brand-text">PixelForge Tech</span>
        </div>

        <div id="content">
            <div class="loading">
                <p>Loading your special message…</p>
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// Your web app's Firebase configuration (must match fathers_day.html)
const firebaseConfig = {
    apiKey: "AIzaSyCB4zFWln46AcOZVo88RFqxyI4qDjss2eU",
    authDomain: "father-s-day-366f2.firebaseapp.com",
    projectId: "father-s-day-366f2",
    storageBucket: "father-s-day-366f2.firebasestorage.app",
    messagingSenderId: "236691517012",
    appId: "1:236691517012:web:e7892ae292059ece7847c1",
    measurementId: "G-WM6VC0LWSC"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

const audio = document.getElementById('welcomeAudio');
function enableAudio() {
    audio.play().then(() => {
        console.log("Audio playing");
    }).catch(error => {
        console.log("Autoplay prevented by browser, waiting for user interaction.");
    });
    document.removeEventListener('click', enableAudio);
}
document.addEventListener('click', enableAudio);

    /*GRATITUDE STRIP */
    (function buildGratitudeStrip() {
        const words = [
            { icon: 'fa-heart', text: 'Thank you for your love' },
            { icon: 'fa-shield-heart', text: 'Thank you for protecting us' },
            { icon: 'fa-hand-holding-heart', text: 'Grateful for every sacrifice' },
            { icon: 'fa-house-chimney-window', text: 'Thank you for our home' },
            { icon: 'fa-graduation-cap', text: 'Thank you for every lesson' },
            { icon: 'fa-star', text: 'You are our hero, Dad' },
            { icon: 'fa-hands-holding-child', text: 'Thank you for always being there' },
            { icon: 'fa-route', text: 'Thank you for guiding us' },
        ];
        const track = document.getElementById('gratitudeTrack');
        const html = words.map(w => `<span><i class="fa-solid ${w.icon}"></i>${w.text}</span>`).join('');
        track.innerHTML = html + html;
    })();

    /* ── AURORA CANVAS ── */
    (function initAurora() {
        const canvas = document.getElementById('aurora-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, t = 0;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const waves = [
            { color: [255, 0, 140],  speed: 0.003,  amp: 0.12, phase: 0   },
            { color: [0, 200, 255],  speed: 0.002,  amp: 0.09, phase: 1.5 },
            { color: [180, 0, 255],  speed: 0.0015, amp: 0.07, phase: 3   },
            { color: [255, 200, 0],  speed: 0.0025, amp: 0.05, phase: 4.5 },
        ];

        function drawAurora() {
            ctx.clearRect(0, 0, W, H);
            const bg = ctx.createLinearGradient(0, 0, 0, H);
            bg.addColorStop(0, '#0a0a14');
            bg.addColorStop(1, '#07070f');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            waves.forEach((wave, wi) => {
                wave.phase += wave.speed;
                const grad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
                const [r, g, b] = wave.color;
                grad.addColorStop(0,   `rgba(${r},${g},${b},0)`);
                grad.addColorStop(0.3, `rgba(${r},${g},${b},0.07)`);
                grad.addColorStop(0.6, `rgba(${r},${g},${b},0.04)`);
                grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);

                ctx.beginPath();
                ctx.moveTo(0, H * 0.5);
                for (let x = 0; x <= W; x += 4) {
                    const nx = x / W;
                    const y = H * 0.38
                        + Math.sin(nx * 5 + wave.phase) * H * wave.amp
                        + Math.sin(nx * 3 + wave.phase * 1.3 + wi) * H * (wave.amp * 0.5);
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(W, H);
                ctx.lineTo(0, H);
                ctx.closePath();
                ctx.fillStyle = grad;
                ctx.fill();
            });

            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            for (let i = 0; i < 80; i++) {
                const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * W;
                const sy = (Math.sin(i * 311.7) * 0.5 + 0.5) * H * 0.6;
                const sr = 0.5 + Math.sin(t * 0.02 + i) * 0.3;
                ctx.beginPath();
                ctx.arc(sx, sy, Math.max(0.1, sr), 0, Math.PI * 2);
                ctx.fill();
            }
            t++;
            requestAnimationFrame(drawAurora);
        }
        drawAurora();
    })();

    /* ── TSPARTICLES ── */
    tsParticles.load("tsparticles", {
        fullScreen: { enable: false },
        background: { color: { value: "transparent" } },
        fpsLimit: 60,
        particles: {
            number: { value: 26, density: { enable: true, area: 900 } },
            color: { value: ["#ff6b9d","#FFD700","#00c9a7","#a78bfa","#ffffff"] },
            shape: { type: ["heart","circle","star"] },
            opacity: { value: 0.5, random: true, animation: { enable: true, speed: 0.6, minimumValue: 0.1, sync: false } },
            size: { value: { min: 4, max: 12 }, random: true, animation: { enable: true, speed: 2, minimumValue: 2, sync: false } },
            move: { enable: true, speed: { min: 0.5, max: 1.8 }, direction: "top", random: true, straight: false, outModes: { default: "out" } },
            rotate: { value: { min: 0, max: 360 }, animation: { enable: true, speed: 8, sync: false } }
        },
        interactivity: {
            events: { onHover: { enable: true, mode: "bubble" } },
            modes: { bubble: { distance: 120, size: 16, duration: 0.4, opacity: 0.8 } }
        },
        detectRetina: true
    });

    /* ── SPARKLES ── */
    function spawnSparkles(container, count) {
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const angle = Math.random() * Math.PI * 2;
            const radius = 60 + Math.random() * 50;
            const x = 50 + Math.cos(angle) * (radius / 2.4);
            const y = 50 + Math.sin(angle) * (radius / 2.4);
            s.style.left = x + '%';
            s.style.top = y + '%';
            s.style.animationDelay = (Math.random() * 1.8) + 's';
            container.appendChild(s);
        }
    }

    /* ── CONFETTI ── */
    function createConfetti() {
        const colors = ['#FFD700','#FF69B4','#ff6b9d','#c44569','#00c9a7','#a78bfa','#ffffff'];
        for (let i = 0; i < 80; i++) {
            const el = document.createElement('div');
            el.className = 'confetti-piece';
            const size  = Math.random() * 10 + 5;
            const round = Math.random() > 0.5;
            el.style.cssText = `
                left:${Math.random()*100}vw; top:-12px;
                width:${size}px; height:${round ? size : size * 0.5}px;
                background:${colors[Math.floor(Math.random()*colors.length)]};
                border-radius:${round ? '50%' : '2px'};
                opacity:${Math.random()*0.7+0.3};
                animation:confettiFall ${Math.random()*3+2}s ease-in forwards;
                animation-delay:${Math.random()*0.8}s;
            `;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }
    }

    /* ── HTML ESCAPE ── */
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    /* ── LOAD WISH ── */
    function getUrlParam(param) {
        return new URLSearchParams(window.location.search).get(param);
    }

    async function loadWishData() {
        const id = getUrlParam('id');
        const contentDiv = document.getElementById('content');

        if (!id) {
            contentDiv.innerHTML = '<div class="error-message"><i class="fa-solid fa-circle-exclamation"></i> Invalid link. No envelope ID was provided.</div>';
            return;
        }

        try {
            const snap = await getDoc(doc(db, 'wishes', id));

            if (!snap.exists()) {
                contentDiv.innerHTML = '<div class="error-message"><i class="fa-solid fa-circle-exclamation"></i> This envelope is not available or has expired. Ask them to resend the link!</div>';
                return;
            }

            renderEnvelopeStage(snap.data());
        } catch (e) {
            console.error('Error loading wish from Firestore:', e);
            contentDiv.innerHTML = '<div class="error-message"><i class="fa-solid fa-circle-exclamation"></i> Something went wrong opening this envelope. Please try again.</div>';
        }
    }

    /* ── STAGE 1: SEALED ENVELOPE ── */
    function renderEnvelopeStage(wishData) {
        const contentDiv = document.getElementById('content');

        contentDiv.innerHTML = `
            <div class="envelope-stage">
                <h2><i class="fa-solid fa-heart" style="color:#ffe6cc;"></i> A Message For You, Dad</h2>
                <p class="from-line">Sealed with love by <strong>${escapeHtml(wishData.name)}</strong></p>

                <div class="envelope-click-area" id="envelopeClick">
                    <div class="envelope-letter-peek"></div>
                    <div class="envelope-body"></div>
                    <div class="envelope-flap"></div>
                    <div class="envelope-seal"><i class="fa-solid fa-heart"></i></div>
                </div>

                <div class="envelope-hint">
                    <i class="fa-solid fa-hand-pointer"></i>
                    Tap the envelope to open your message
                </div>
            </div>
        `;

        document.getElementById('envelopeClick').addEventListener('click', function () {
            this.classList.add('opening');
            this.style.pointerEvents = 'none';
            setTimeout(() => renderRevealStage(wishData), 750);
        });
    }

    /* ── STAGE 2: REVEALED MESSAGE ── */
    function renderRevealStage(wishData) {
        const contentDiv = document.getElementById('content');

        contentDiv.innerHTML = `
            <div class="reveal-stage visible animate__animated animate__fadeIn">
                <div class="reveal-header">
                    <h1>Happy Father's Day</h1>
                </div>
                <div class="from-name">From <strong>${escapeHtml(wishData.name)}</strong>, with love</div>

                <div class="photo-section">
                    <div class="circle-wrapper">
                        <div class="ring-outer"></div>
                        <div class="ring-inner"></div>
                        <div class="circle-frame">
                            <img src="${wishData.photo}" class="photo-image" alt="A cherished photo">
                            <div class="sparkle-layer" id="sparkleLayer"></div>
                        </div>
                    </div>
                </div>

                <div class="message-section">
                    <div class="message-label"><i class="fa-solid fa-envelope-open-text"></i> Their Message To You</div>
                    <div class="message-text">${escapeHtml(wishData.message)}</div>

                    <div class="gratitude-tags">
                        <span class="gratitude-tag"><i class="fa-solid fa-heart"></i> Loved</span>
                        <span class="gratitude-tag"><i class="fa-solid fa-star"></i> Appreciated</span>
                        <span class="gratitude-tag"><i class="fa-solid fa-crown"></i> Our Hero</span>
                        <span class="gratitude-tag"><i class="fa-solid fa-hand-holding-heart"></i> Grateful</span>
                    </div>
                </div>

                <button class="button btn-primary" id="backBtn">
                    <i class="fa-solid fa-pen-nib"></i> Create Your Own Message
                </button>

                <div class="footer">
                    <p><span class="heart-accent">♥</span> A special day for special dads <span class="heart-accent">♥</span></p>
                    <p style="margin-top:8px;">Thank you for being awesome, Dad!</p>
                    <div class="footer-brand">
                        <i class="fa-solid fa-bolt" style="color:#FFFF00;"></i>
                        Crafted by
                        <span class="pixel-blocks">
                            <span style="background:#FF008C;"></span>
                            <span style="background:#00FFFF;"></span>
                            <span style="background:#FFFF00;"></span>
                        </span>
                        <strong style="background:linear-gradient(90deg,#FF008C,#00FFFF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">PixelForge Tech</strong>
                    </div>
                </div>
            </div>
        `;

        spawnSparkles(document.getElementById('sparkleLayer'), 14);
        createConfetti();

        document.getElementById('backBtn').addEventListener('click', function () {
            window.location.href = 'fathers_day.html';
        });
    }

    window.addEventListener('load', loadWishData);
    </script>
</body>
</html>
